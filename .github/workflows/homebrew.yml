name: Homebrew

on:
  push:
    branches: [main]
    paths:
      - 'Formula/**'
  pull_request:
    branches: [main]
    paths:
      - 'Formula/**'
  workflow_dispatch:

jobs:
  test-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Set up tap
        run: brew tap leftrk/tap ${{ github.workspace }}

      - name: Install formula
        run: brew install --build-from-source leftrk/tap/rmsafe

      - name: Test formula
        run: |
          # Test CLI exists
          test -f "$(brew --prefix rmsafe)/bin/rmsafe"

          # Test --help
          rmsafe --help | grep -q "trash"

          # Test trash operation
          echo "test content" > /tmp/test_brew_file.txt
          rmsafe trash /tmp/test_brew_file.txt
          test ! -f /tmp/test_brew_file.txt

          # Test list
          rmsafe list | grep -q "test_brew_file"

          # Test undo
          rmsafe undo --list | grep -q "test_brew_file"

          # Test status
          rmsafe status | grep -q "Trash"

      - name: Cleanup
        if: always()
        run: brew uninstall rmsafe || true