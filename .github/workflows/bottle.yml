name: Bottle

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula to bottle"
        required: true
        default: "rmsafe"

jobs:
  bottle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
          - runner: macos-15
          - runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        if: runner.os == 'Linux'
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap formula (macOS)
        if: runner.os == 'macOS'
        run: brew tap leftrk/tap "${{ github.workspace }}"

      - name: Build bottle
        run: |
          brew install --build-bottle leftrk/tap/${{ inputs.formula }}
          brew bottle --json --root-url="https://github.com/${{ github.repository }}/releases/download/bottles" leftrk/tap/${{ inputs.formula }}
          ls -la *.bottle.*.tar.gz *.bottle.json

      - uses: actions/upload-artifact@v7
        with:
          name: bottle-${{ matrix.runner }}
          path: |
            *.bottle.*.tar.gz
            *.bottle.json

  upload:
    needs: bottle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Rename bottle files for Homebrew 5.x
        run: |
          for f in *--*.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f//--/-}"
          done

      - name: Create or update bottles release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create bottles --title "Bottles" --notes "Pre-built bottles" 2>/dev/null || true
          for f in *.bottle.*.tar.gz; do
            gh release upload bottles "$f" --clobber
          done

      - name: Generate bottle block and update formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - *.bottle.json <<'PYEOF' > /tmp/bottle-block.txt
          import json, sys, pathlib
          bottles = {}
          for f in sys.argv[1:]:
              data = json.loads(pathlib.Path(f).read_text())
              for formula_data in data.values():
                  for tag, info in formula_data["bottle"]["tags"].items():
                      bottles[tag] = info["sha256"]
          root = "https://github.com/${{ github.repository }}/releases/download/bottles"
          lines = ["  bottle do", f'    root_url "{root}"']
          lines.append("    rebuild 1")
          for tag, sha in sorted(bottles.items()):
              lines.append(f'    sha256 cellar: :any_skip_relocation, {tag}: "{sha}"')
          lines.append("  end")
          print("\n".join(lines))
          PYEOF

          echo "=== Generated bottle block ==="
          cat /tmp/bottle-block.txt

          # Remove any existing bottle block(s), then insert the new one before the
          # first depends_on. Without removal, repeated runs stack multiple
          # bottle blocks and Homebrew uses the first (stale) one.
          python3 <<'PYEOF'
          import re
          formula_path = "Formula/${{ inputs.formula }}.rb"
          bottle_block = open("/tmp/bottle-block.txt").read().strip()
          formula = open(formula_path).read()
          formula = re.sub(r'\n *bottle do\n.*?\n *end\n', '\n', formula, flags=re.DOTALL)
          formula = re.sub(r"(?=\n  depends_on)", "\n" + bottle_block + "\n", formula, count=1)
          open(formula_path, "w").write(formula)
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/${{ inputs.formula }}.rb
          git diff --cached --quiet && echo "No changes to commit" || (
            git commit -m "chore: add bottle hashes for ${{ inputs.formula }}"
            git pull --rebase origin main
            git push
          )
