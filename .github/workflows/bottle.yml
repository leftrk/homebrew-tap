name: Bottle

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula to bottle"
        required: true
        default: "rmsafe"

jobs:
  bottle:
    strategy:
      matrix:
        runner: [macos-13, macos-14]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build bottle
        run: |
          brew install --build-bottle Formula/${{ inputs.formula }}.rb
          brew bottle --json --root-url="https://github.com/${{ github.repository }}/releases/download/bottles" Formula/${{ inputs.formula }}.rb
          ls -la *.tar.gz *.json

      - uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.runner }}
          path: |
            *.bottle.tar.gz
            *.bottle.json

  upload:
    needs: bottle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or update bottles release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create bottles --title "Bottles" --notes "Pre-built bottles" 2>/dev/null || true
          for f in *.bottle.tar.gz; do
            gh release upload bottles "$f" --clobber
          done

      - name: Generate bottle block
        run: |
          echo "=== Add this to Formula/${{ inputs.formula }}.rb ==="
          python3 - *.bottle.json <<'PYEOF'
          import json, sys, pathlib
          bottles = {}
          for f in sys.argv[1:]:
              data = json.loads(pathlib.Path(f).read_text())
              for formula_data in data.values():
                  for tag, info in formula_data["bottle"]["tags"].items():
                      bottles[tag] = info["sha256"]
          print("  bottle do")
          root = "https://github.com/${{ github.repository }}/releases/download/bottles"
          print(f'    root_url "{root}"')
          for tag, sha in sorted(bottles.items()):
              print(f'    sha256 cellar: :any_skip_relocation, {tag}: "{sha}"')
          print("  end")
          PYEOF
